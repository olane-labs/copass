name: release-python

# Two release paths share this workflow file (and therefore share PyPI
# Trusted-Publisher entries — keyed on workflow_filename + environment):
#
#  1. Manual single-package release via ``workflow_dispatch``. Version
#     bumps are user-driven — edit ``pyproject.toml::version`` in the
#     target package, commit, merge, then trigger from the Actions tab.
#     The downstream ``release-*`` jobs handle this path.
#
#  2. Lockstep release on push to ``production``. Single source of
#     truth is ``python/VERSION``. Each package's ``pyproject.toml``
#     reads ``python/VERSION`` directly via
#     ``[tool.hatch.version] source = regex``, so the workflow only
#     needs to call ``python -m build`` per package — no version
#     stamping step. The ``release-production`` matrix publishes
#     every package at the same version in parallel.
#
#     **Auto-patch bump.** Every push to ``production`` ships a release.
#     The ``prepare-version`` job:
#       - If ``python/VERSION`` changed in the pushed commit → uses it
#         verbatim (manual major/minor/breaking bumps stay in your hands).
#       - If unchanged → queries PyPI for the highest published version
#         of the sentinel package (``copass-config``) and auto-bumps its
#         PATCH component. The matrix stamps the resolved version into a
#         workspace-local ``python/VERSION`` before build — no commit or
#         push back to ``production`` (which has branch protection that
#         blocks workflow-token writes). PyPI is the source of truth.
#     Net effect: merge to ``production`` and the lockstep release ships
#     automatically — no manual VERSION bump required for routine fixes.
#     ``python/VERSION`` in-repo is treated as a manual override floor;
#     it is allowed to lag behind PyPI between manual bumps.
#     Non-SemVer ``python/VERSION`` (e.g. ``1.4.3a1``) fails the
#     auto-bump and requires a manual edit.
#
# Both paths use PyPI Trusted Publishing (OIDC — no long-lived tokens).
#
# Prerequisites (done once per package on pypi.org):
#   1. Reserve the package name.
#   2. Project -> Publishing -> Add a new publisher (GitHub).
#      - Owner:       olane-labs
#      - Repository:  copass
#      - Workflow:    release-python.yml
#      - Environment: pypi
#
# The `pypi` environment below is referenced by both the PyPI
# trusted-publisher config and the GitHub-side environment. Use it to
# add approvals or branch gates if desired.

on:
  push:
    branches: [production]
    # No ``paths:`` filter — every push to ``production`` ships a
    # release. ``prepare-version`` either uses an explicit VERSION bump
    # or auto-bumps the patch component when nothing changed.
  workflow_dispatch:
    inputs:
      package:
        description: 'Package to release'
        required: true
        default: 'all'
        type: choice
        options:
          - copass-core
          - copass-core-agents
          - copass-context-agents
          - copass-anthropic-agents
          - copass-google-agents
          - copass-hermes-agents
          - both
          - all
      release_mode:
        description: 'Release mode'
        required: true
        default: 'stable'
        type: choice
        options:
          - stable
          - dry-run

concurrency:
  group: release-python
  cancel-in-progress: false

jobs:
  # ─── Lockstep production release ─────────────────────────────────
  #
  # Fires on every push to ``production``. ``prepare-version`` resolves
  # the version to ship: if ``python/VERSION`` changed in the pushed
  # commit it's used as-is; otherwise the patch component is auto-bumped
  # and the new VERSION is committed back to ``production``. The matrix
  # then checks out the resolved SHA so ``[tool.hatch.version]`` reads
  # the right value at build time.

  prepare-version:
    name: Prepare release version
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/production' }}
    runs-on: ubuntu-latest
    # No ``contents: write`` — we do NOT push the bump back. Branch
    # protection on ``production`` rejects workflow-token writes, so
    # PyPI is the source of truth instead: each matrix job stamps the
    # resolved version into a workspace-local ``python/VERSION`` before
    # ``python -m build`` runs.
    outputs:
      version: ${{ steps.resolve.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          # Need the parent commit to diff python/VERSION against.
          fetch-depth: 2

      - id: resolve
        env:
          # Sentinel package used to discover the highest version
          # currently on PyPI when no manual bump is provided. All
          # Python packages release in lockstep, so any one of them
          # works; ``copass-config`` is the most stable.
          PYPI_SENTINEL: copass-config
        run: |
          set -euo pipefail
          if [ ! -f python/VERSION ]; then
            echo "::error::python/VERSION missing"
            exit 1
          fi

          file_v=$(tr -d '[:space:]' < python/VERSION)
          if [ -z "$file_v" ]; then
            echo "::error::python/VERSION is empty"
            exit 1
          fi

          # Did VERSION change in the pushed commit? Match only actual
          # +/- content lines (``^[+-][^+-]``) — the naive ``^[+-]``
          # also matches the ``--- a/...`` / ``+++ b/...`` diff headers
          # and would always return true on a metadata-only change.
          if git diff HEAD~1 HEAD -- python/VERSION | grep -q '^[+-][^+-]'; then
            echo "::notice::python/VERSION explicitly set to ${file_v} in this push — using verbatim"
            echo "version=${file_v}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # VERSION unchanged → derive next patch from PyPI. The
          # in-repo ``python/VERSION`` is treated as a manual override
          # floor and is allowed to lag behind PyPI between bumps.
          pypi_v=$(
            curl -fsSL "https://pypi.org/pypi/${PYPI_SENTINEL}/json" \
              | python3 -c 'import json,sys; print(json.load(sys.stdin)["info"]["version"])'
          )
          if [ -z "$pypi_v" ]; then
            echo "::error::Could not read latest version of ${PYPI_SENTINEL} from PyPI"
            exit 1
          fi

          # If the in-repo file is higher than PyPI (manual bump landed
          # in a prior commit but never published — e.g. last release
          # workflow failed), use the higher of the two as the base.
          base="$pypi_v"
          if [ "$(printf '%s\n%s\n' "$file_v" "$pypi_v" | sort -V | tail -n1)" = "$file_v" ] \
             && [ "$file_v" != "$pypi_v" ]; then
            base="$file_v"
            echo "::notice::python/VERSION (${file_v}) is ahead of PyPI (${pypi_v}); using ${base} as base"
          fi

          if ! echo "$base" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::Cannot auto-bump non-SemVer version '${base}'. Edit python/VERSION manually and re-push."
            exit 1
          fi

          major=$(echo "$base" | cut -d. -f1)
          minor=$(echo "$base" | cut -d. -f2)
          patch=$(echo "$base" | cut -d. -f3)
          new="${major}.${minor}.$((patch + 1))"
          echo "::notice::Auto-resolved release version: base=${base} (PyPI=${pypi_v}, file=${file_v}) → ${new}"
          echo "version=${new}" >> "$GITHUB_OUTPUT"

  release-production:
    name: "Release ${{ matrix.package }} @ ${{ needs.prepare-version.outputs.version }}"
    needs: [prepare-version]
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
      contents: read
    strategy:
      # Don't fail-fast — one package's flake shouldn't block the others.
      # Concurrency=2 to avoid rate-limiting PyPI / runner pools while
      # still releasing in parallel.
      fail-fast: false
      max-parallel: 2
      matrix:
        package:
          - copass-core
          - copass-core-agents
          - copass-context-agents
          - copass-anthropic-agents
          - copass-google-agents
          - copass-hermes-agents
          - copass-agent-router
          - copass-config
          - copass-langchain
          - copass-management
          - copass-pydantic-ai
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build tooling
        run: pip install build

      - name: Sync bundled spec corpus from harness source
        if: matrix.package == 'copass-management'
        run: python3 python/copass-management/scripts/sync_spec.py

      - name: Stamp resolved release version into python/VERSION
        # Each package's ``pyproject.toml`` reads ``python/VERSION``
        # directly via ``[tool.hatch.version] source = regex``. We
        # overwrite the file in the workspace (no commit) with the
        # version resolved by ``prepare-version`` so ``python -m build``
        # picks up the correct value at build time.
        run: echo "${{ needs.prepare-version.outputs.version }}" > python/VERSION

      - name: Install local sibling packages (so tests resolve from checkout)
        run: |
          # Install the SDK + agents packages from local checkout so this
          # package's tests run against the freshly-stamped sources, not
          # the previous PyPI release.
          for sibling in copass-core copass-core-agents copass-context-agents; do
            if [ "$sibling" != "${{ matrix.package }}" ] && [ -f "python/$sibling/pyproject.toml" ]; then
              pip install -e "python/$sibling" || true
            fi
          done

      - name: Install package + dev deps
        working-directory: python/${{ matrix.package }}
        run: pip install -e ".[dev]"

      # ── SDK CONTRACT GUARD (pre-publish) ───────────────────────────
      # Runs the full mock-based test suite for this package. This is
      # the deploy guard the README + integration/README.md reference:
      # if a refactor breaks any wire-format / response-shape contract,
      # the matching test in ``tests/test_full/`` (copass-core) or
      # ``tests/test_*.py`` (other packages) fails here BEFORE the
      # package is published to PyPI.
      #
      # Tolerates exit 5 (no tests collected) — some packages ship
      # without tests. ANY other non-zero exit halts the matrix run
      # for this package and skips the publish step.
      - name: SDK contract guard (mock-based tests)
        working-directory: python/${{ matrix.package }}
        run: pytest -q || [ $? -eq 5 ]

      - name: Build (sdist + wheel)
        working-directory: python/${{ matrix.package }}
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: python/${{ matrix.package }}/dist/

  # ─── Manual single-package dispatch jobs ─────────────────────────
  #
  # Each of the four jobs below runs ONLY on ``workflow_dispatch`` —
  # the ``inputs.package`` check evaluates to false on push events,
  # so they're skipped during a lockstep release.

  release-copass-core:
    # The Python SDK that mirrors `@copass/core`. Lands BEFORE the
    # *-agents jobs so when ``all`` is selected, downstream packages
    # that depend on ``copass-core`` (e.g. copass-context-agents at
    # ``copass-core>=0.1.0``) install against the freshly-published
    # SDK rather than the previous PyPI release. When the user picks
    # only an *-agents package, this job is skipped — the agent jobs
    # then resolve ``copass-core`` from whatever's already on PyPI.
    if: ${{ github.event_name == 'workflow_dispatch' && (inputs.package == 'copass-core' || inputs.package == 'all') }}
    name: Release copass-core
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
      contents: read
    defaults:
      run:
        working-directory: python/copass-core
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build tooling
        run: pip install build

      - name: Install + test
        run: |
          pip install -e ".[dev]"
          # Tolerate exit 5 (no tests collected) — some packages ship without tests.
          pytest -q || [ $? -eq 5 ]

      - name: Show version
        id: version
        run: |
          v=$(python -c 'import tomllib; print(tomllib.loads(open("pyproject.toml","rb").read().decode())["project"]["version"])')
          echo "value=$v" >> "$GITHUB_OUTPUT"
          echo "Releasing copass-core $v (mode=${{ inputs.release_mode }})"

      - name: Build (sdist + wheel)
        run: python -m build

      - name: Publish to PyPI
        if: ${{ inputs.release_mode == 'stable' }}
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: python/copass-core/dist/

      - name: Dry-run summary
        if: ${{ inputs.release_mode == 'dry-run' }}
        run: |
          echo "Dry run — built but skipped publish."
          ls -la dist/

  release-core:
    needs: [release-copass-core]
    # Run when (a) it's a manual dispatch, (b) the user asked for this
    # package, and (c) the upstream SDK job either succeeded OR was
    # skipped (user asked for an *-agents package alone).
    # ``always()`` lets us inspect needs.*.result.
    if: >-
      always()
      && github.event_name == 'workflow_dispatch'
      && (inputs.package == 'copass-core-agents' || inputs.package == 'both' || inputs.package == 'all')
      && (needs.release-copass-core.result == 'success' || needs.release-copass-core.result == 'skipped')
    name: Release copass-core-agents
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
      contents: read
    defaults:
      run:
        working-directory: python/copass-core-agents
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build tooling
        run: pip install build

      - name: Install + test
        run: |
          pip install -e ".[dev]"
          # Tolerate exit 5 (no tests collected) — some packages ship without tests.
          pytest -q || [ $? -eq 5 ]

      - name: Show version
        id: version
        run: |
          v=$(python -c 'import tomllib; print(tomllib.loads(open("pyproject.toml","rb").read().decode())["project"]["version"])')
          echo "value=$v" >> "$GITHUB_OUTPUT"
          echo "Releasing copass-core-agents $v (mode=${{ inputs.release_mode }})"

      - name: Build (sdist + wheel)
        run: python -m build

      - name: Publish to PyPI
        if: ${{ inputs.release_mode == 'stable' }}
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: python/copass-core-agents/dist/

      - name: Dry-run summary
        if: ${{ inputs.release_mode == 'dry-run' }}
        run: |
          echo "Dry run — built but skipped publish."
          ls -la dist/

  release-context:
    name: Release copass-context-agents
    runs-on: ubuntu-latest
    needs: [release-core]
    # Same pattern as release-anthropic/release-google below: dispatch-
    # only, runs when requested AND the upstream job either succeeded
    # OR was skipped (user asked for this package alone).
    if: >-
      always()
      && github.event_name == 'workflow_dispatch'
      && (inputs.package == 'copass-context-agents' || inputs.package == 'all')
      && (needs.release-core.result == 'success' || needs.release-core.result == 'skipped')
    environment: pypi
    permissions:
      id-token: write
      contents: read
    defaults:
      run:
        working-directory: python/copass-context-agents
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build tooling
        run: pip install build

      - name: Install copass-core-agents (from this checkout, for test)
        run: pip install -e ./python/copass-core-agents
        working-directory: .

      - name: Install + test
        run: |
          pip install -e ".[dev]"
          # Tolerate exit 5 (no tests collected) — some packages ship without tests.
          pytest -q || [ $? -eq 5 ]

      - name: Show version
        id: version
        run: |
          v=$(python -c 'import tomllib; print(tomllib.loads(open("pyproject.toml","rb").read().decode())["project"]["version"])')
          echo "value=$v" >> "$GITHUB_OUTPUT"
          echo "Releasing copass-context-agents $v (mode=${{ inputs.release_mode }})"

      - name: Build (sdist + wheel)
        run: python -m build

      - name: Publish to PyPI
        if: ${{ inputs.release_mode == 'stable' }}
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: python/copass-context-agents/dist/

      - name: Dry-run summary
        if: ${{ inputs.release_mode == 'dry-run' }}
        run: |
          echo "Dry run — built but skipped publish."
          ls -la dist/

  release-anthropic:
    name: Release copass-anthropic-agents
    runs-on: ubuntu-latest
    needs: [release-core, release-context]
    # Run when (a) it's a manual dispatch, (b) the user asked for this
    # package, and (c) both upstream jobs either succeeded OR were
    # skipped (user asked for anthropic only). `always()` lets us
    # inspect `needs.*.result`.
    if: >-
      always()
      && github.event_name == 'workflow_dispatch'
      && (inputs.package == 'copass-anthropic-agents' || inputs.package == 'both' || inputs.package == 'all')
      && (needs.release-core.result == 'success' || needs.release-core.result == 'skipped')
      && (needs.release-context.result == 'success' || needs.release-context.result == 'skipped')
    environment: pypi
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build tooling
        run: pip install build

      - name: Install copass-core-agents (from this checkout, for test)
        run: pip install -e ./python/copass-core-agents

      - name: Install copass-context-agents (from this checkout, for test)
        run: pip install -e ./python/copass-context-agents

      - name: Install + test
        working-directory: python/copass-anthropic-agents
        run: |
          pip install -e ".[dev]"
          # Tolerate exit 5 (no tests collected) — some packages ship without tests.
          pytest -q || [ $? -eq 5 ]

      - name: Show version
        id: version
        working-directory: python/copass-anthropic-agents
        run: |
          v=$(python -c 'import tomllib; print(tomllib.loads(open("pyproject.toml","rb").read().decode())["project"]["version"])')
          echo "value=$v" >> "$GITHUB_OUTPUT"
          echo "Releasing copass-anthropic-agents $v (mode=${{ inputs.release_mode }})"

      - name: Build (sdist + wheel)
        working-directory: python/copass-anthropic-agents
        run: python -m build

      - name: Publish to PyPI
        if: ${{ inputs.release_mode == 'stable' }}
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: python/copass-anthropic-agents/dist/

      - name: Dry-run summary
        if: ${{ inputs.release_mode == 'dry-run' }}
        working-directory: python/copass-anthropic-agents
        run: |
          echo "Dry run — built but skipped publish."
          ls -la dist/

  release-google:
    name: Release copass-google-agents
    runs-on: ubuntu-latest
    needs: [release-core, release-context]
    # Mirrors release-anthropic: dispatch-only, runs when (a) the user
    # asked for this package and (b) both upstream jobs either
    # succeeded OR were skipped.
    if: >-
      always()
      && github.event_name == 'workflow_dispatch'
      && (inputs.package == 'copass-google-agents' || inputs.package == 'all')
      && (needs.release-core.result == 'success' || needs.release-core.result == 'skipped')
      && (needs.release-context.result == 'success' || needs.release-context.result == 'skipped')
    environment: pypi
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build tooling
        run: pip install build

      - name: Install copass-core-agents (from this checkout, for test)
        run: pip install -e ./python/copass-core-agents

      - name: Install copass-context-agents (from this checkout, for test)
        run: pip install -e ./python/copass-context-agents

      - name: Install + test
        working-directory: python/copass-google-agents
        run: |
          pip install -e ".[dev]"
          # Tolerate exit 5 (no tests collected) — some packages ship without tests.
          pytest -q || [ $? -eq 5 ]

      - name: Show version
        id: version
        working-directory: python/copass-google-agents
        run: |
          v=$(python -c 'import tomllib; print(tomllib.loads(open("pyproject.toml","rb").read().decode())["project"]["version"])')
          echo "value=$v" >> "$GITHUB_OUTPUT"
          echo "Releasing copass-google-agents $v (mode=${{ inputs.release_mode }})"

      - name: Build (sdist + wheel)
        working-directory: python/copass-google-agents
        run: python -m build

      - name: Publish to PyPI
        if: ${{ inputs.release_mode == 'stable' }}
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: python/copass-google-agents/dist/

      - name: Dry-run summary
        if: ${{ inputs.release_mode == 'dry-run' }}
        working-directory: python/copass-google-agents
        run: |
          echo "Dry run — built but skipped publish."
          ls -la dist/
