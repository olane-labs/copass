name: CI - Python

on:
  push:
    branches: [main]
    paths:
      - 'python/copass-core-agents/**'
      - 'python/copass-anthropic-agents/**'
      - '.github/workflows/ci-python.yml'
  pull_request:
    branches: [main]
    paths:
      - 'python/copass-core-agents/**'
      - 'python/copass-anthropic-agents/**'
      - '.github/workflows/ci-python.yml'

jobs:
  core:
    name: copass-core-agents (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']
    defaults:
      run:
        working-directory: python/copass-core-agents
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
          cache-dependency-path: python/copass-core-agents/pyproject.toml

      - name: Install
        run: pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check .

      - name: Test
        run: pytest -q

  anthropic:
    name: copass-anthropic-agents (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: core
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
          cache-dependency-path: python/copass-anthropic-agents/pyproject.toml

      - name: Install copass-core-agents (editable, from this checkout)
        run: pip install -e ./python/copass-core-agents

      - name: Install copass-anthropic-agents
        working-directory: python/copass-anthropic-agents
        run: pip install -e ".[dev]"

      - name: Lint (ruff)
        working-directory: python/copass-anthropic-agents
        run: ruff check .

      - name: Test
        working-directory: python/copass-anthropic-agents
        run: pytest -q
