name: release-typescript

on:
  workflow_dispatch:
    inputs:
      release_mode:
        description: 'Release mode'
        required: true
        default: 'stable'
        type: choice
        options:
          - stable
          - prerelease
          - graduate
          - dry-run

concurrency:
  group: release-typescript
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    defaults:
      run:
        working-directory: typescript
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org/'
          cache: 'pnpm'
          cache-dependency-path: typescript/pnpm-lock.yaml

      - name: Configure git identity
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      # ── SDK CONTRACT GUARD (pre-publish) ───────────────────────────
      # Runs the full mock-based test suite for every TS package
      # (vitest, recursive). This is the deploy guard the
      # ``integration/README.md`` references: if a refactor breaks any
      # wire-format / response-shape contract, the matching test in
      # ``packages/<pkg>/test/unit/resources/full/`` (core) or
      # ``packages/<pkg>/test/unit/v2-propagation.test.ts`` (adapters)
      # fails here BEFORE the package is published to npm.
      #
      # Specifically catches:
      #   - SDK request-shape regressions (URL/body/headers)
      #   - SDK response-unpacking regressions
      #   - copass/2.0 preset-propagation regressions in adapter wrappers
      #   - MCP adapter ZodObject vs ZodRawShape regressions
      #     (registerToMcpServer in @copass/management)
      - name: SDK contract guard (mock-based tests)
        run: pnpm test

      - name: Bump versions (stable)
        if: ${{ inputs.release_mode == 'stable' }}
        run: pnpm exec lerna version --conventional-commits --yes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Bump versions (prerelease)
        if: ${{ inputs.release_mode == 'prerelease' }}
        run: pnpm exec lerna version --conventional-commits --conventional-prerelease --preid next --yes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Bump versions (graduate prereleases)
        if: ${{ inputs.release_mode == 'graduate' }}
        run: pnpm exec lerna version --conventional-commits --conventional-graduate --yes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Dry-run publish
        if: ${{ inputs.release_mode == 'dry-run' }}
        run: pnpm exec lerna exec --no-bail -- pnpm publish --dry-run --access public --no-git-checks

      - name: Publish (stable)
        if: ${{ inputs.release_mode == 'stable' || inputs.release_mode == 'graduate' }}
        run: pnpm exec lerna publish from-package --yes
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish (prerelease)
        if: ${{ inputs.release_mode == 'prerelease' }}
        run: pnpm exec lerna publish from-package --dist-tag next --yes
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
