name: CI - TypeScript

on:
  push:
    branches: [main]
    paths:
      - 'typescript/**'
      - '.github/workflows/ci-typescript.yml'
  pull_request:
    branches: [main]
    paths:
      - 'typescript/**'
      - '.github/workflows/ci-typescript.yml'
  # Allow manual re-runs from the Actions tab — useful when a previous
  # run failed for environmental reasons or when verifying a fix that
  # only touched workflow YAML.
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20, 22]

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'
          cache-dependency-path: typescript/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: typescript
        run: pnpm install --frozen-lockfile

      # Build first so cross-package type resolution works.
      # @copass/core publishes its types under ``dist/index.d.ts``;
      # downstream packages (@copass/agent-router etc.) cannot
      # resolve them until ``tsup`` has emitted that file.
      - name: Build
        working-directory: typescript
        run: pnpm run build

      - name: Type check
        working-directory: typescript
        run: pnpm run typecheck

      - name: Lint
        working-directory: typescript
        run: pnpm run lint

      - name: Test
        working-directory: typescript
        run: pnpm test
